name: Build OpenClaw Android APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "SDK not found"
          which sdkmanager 2>/dev/null || echo "not in PATH"
          ls $ANDROID_HOME/cmdline-tools/latest/bin/ 2>/dev/null || echo "no cmdline-tools"

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -10

      - name: Install dependencies
        run: pnpm install

      - name: Build Android APK (ThirdParty Debug)
        id: build
        run: |
          cd apps/android
          chmod +x ./gradlew
          ./gradlew :app:assembleThirdPartyDebug --no-daemon --info 2>&1 | tail -150
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          ANDROID_SDK_ROOT: ${{ steps.setup-android.outputs.android-home }}

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            ls -lh "$APK"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-${{ github.run_number }}
          path: ${{ steps.build.outputs.apk_path || '' }}
          retention-days: 7
