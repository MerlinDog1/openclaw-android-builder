name: Build OpenClaw Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: |
          cd apps/android
          chmod +x ./gradlew
          # Capture full build output to file
          ./gradlew :app:assembleThirdPartyDebug --no-daemon 2>&1 | tee /tmp/build.log
          echo "=== EXIT CODE ==="
          echo $?
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          ANDROID_SDK_ROOT: ${{ steps.setup-android.outputs.android-home }}

      - name: Show build log
        if: failure()
        run: |
          echo "=== FULL BUILD LOG ==="
          cat /tmp/build.log
          echo "=== DIRECTORY CONTENTS ==="
          ls -la apps/android/app/build/ 2>/dev/null || echo "No build dir"
          ls -la apps/android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
