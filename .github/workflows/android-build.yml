name: Build OpenClaw Android APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -10

      - name: Install dependencies
        run: pnpm install

      - name: Build Android APK (ThirdParty Debug)
        run: |
          cd apps/android
          chmod +x ./gradlew
          ./gradlew :app:assembleThirdPartyDebug --no-daemon 2>&1 | tail -50
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          ANDROID_SDK_ROOT: ${{ steps.setup-android.outputs.android-home }}

      - name: Find and upload APK
        id: find-apk
        run: |
          echo "=== Searching for APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK" >> $GITHUB_OUTPUT
          echo "APK found: $APK"
          ls -lh "$APK" 2>/dev/null || echo "No APK found"

      - name: Upload APK artifact
        if: steps.find-apk.outputs.APK != ''
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.APK }}
          retention-days: 7
