name: Build OpenClaw Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install dependencies
        run: pnpm install

      - name: Build APK
        run: |
          cd apps/android
          chmod +x ./gradlew
          ./gradlew :app:assembleThirdPartyDebug --no-daemon
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          ANDROID_SDK_ROOT: ${{ steps.setup-android.outputs.android-home }}

      - name: Debug build output
        run: |
          echo "=== APK locations ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Expected path check ==="
          ls -la app/build/outputs/apk/thirdParty/debug/ 2>/dev/null || echo "Not found"
          echo "=== Build outputs ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs"
          ls -la app/build/ 2>/dev/null || echo "No build dir"

      - name: Upload APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/thirdParty/debug/app-thirdParty-debug.apk
          retention-days: 7
